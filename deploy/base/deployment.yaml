apiVersion: apps/v1
kind: Deployment
metadata:
  name: cmclasifierserver
  labels:
    app: cmclasifierserver
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cmclasifierserver
  template:
    metadata:
      labels:
        app: cmclasifierserver
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: cmclasifier
          image: test
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: cmclasifier-config
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5